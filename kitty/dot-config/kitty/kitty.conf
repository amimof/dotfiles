font_family family='FiraMono Nerd Font Mono' style=Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 14.2
cursor_shape block
copy_on_select yes

remember_window_size yes
initial_window_width 1024
initial_winfow_height 768

tab_bar_edge top
tab_bar_style powerline
tab_title_max_length 12
tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{tab.last_focused_progress_percent}{title}"
hide_window_decorations yes 

window_border_width 0.5pt

# Move between windows
map ctrl+shift+h neighboring_window left
map ctrl+shift+j neighboring_window down
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up

# Toggle fullscreen
map ctrl+shift+z toggle_layout stack

# https://github.com

# Reset font size
map ctrl+9 change_font_size all 0
map ctrl+plus change_font_size all +1.0
map ctrl+minus change_font_size all -1.0

# Go to previously active tab
map ctrl+shift+a goto_tab -1

# Tabs
map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4
map ctrl+shift+5 goto_tab 5
map ctrl+shift+6 goto_tab 6
map ctrl+shift+7 goto_tab 7
map ctrl+shift+8 goto_tab 8
map ctrl+shift+9 goto_tab 9

# Theming
background #080808
foreground #bdbdbd
cursor #9e9e9e
url_color #79dac8
color0 #323437
color1 #ff5d5d
color2 #8cc85f
color3 #e3c78a
color4 #80a0ff
color5 #cf87e8
color6 #79dac8
color7 #c6c6c6
color8 #949494
color9 #ff5189
color10 #36c692
color11 #c6c684
color12 #74b2ff
color13 #ae81ff
color14 #85dc85
color15 #e4e4e4
selection_background #b2ceee
selection_foreground #080808
active_tab_foreground #080808
active_tab_background #80a0ff
inactive_tab_foreground #b2b2b2
inactive_tab_background #323437
