kitty_mod ctrl+shift
font_family      family="FiraCode Nerd Font Mono" style=Light
bold_font        auto
italic_font      auto
bold_italic_font auto

disable_ligatures always

font_size 14.2
cursor_shape block
copy_on_select yes
allow_remote_control yes
listen_on unix:/tmp/kitty
shell_integration enabled
remember_window_size yes
initial_window_width 1024
initial_winfow_height 768

tab_bar_edge top
tab_bar_style custom
tab_bar_min_tabs 1
tab_title_max_length 12
tab_title_template "{custom}"
hide_window_decorations yes 

window_border_width 0.5pt

# New window
map alt+enter new_window

# Mouse
mouse_map left click ungrabbed no_op
mouse_map cmd+left click ungrabbed mouse_handle_click selection link

# Move between windows
map alt+h neighboring_window left
map alt+j neighboring_window down
map alt+l neighboring_window right
map alt+k neighboring_window up

# Search scrollback
map ctrl+shift+/ search_scrollback

# Toggle fullscreen
map alt+z toggle_layout stack
map alt+n next_layout

# Move tabs
map alt+. move_tab_forward
map alt+, move_tab_backward

# Scrolling
map page_up scroll_page_up
map page_down scroll_page_down

# Reset font size
map ctrl+0 change_font_size all 0
map ctrl+plus change_font_size all +1.0
map ctrl+minus change_font_size all -1.0

# Go to previously active tab
map alt+a goto_tab -1

# Tabs
map alt+q goto_tab 1
map alt+w goto_tab 2
map alt+e goto_tab 3
map alt+r goto_tab 4
map alt+t goto_tab 5
map alt+y goto_tab 6

# Set bell icon
# bell_on_tab ⚠

# Theming
tab_bar_background #08090c
background #0b0d11
foreground #bdbdbd
cursor #9e9e9e
url_color #79dac8
color0 #323437
color1 #ff5d5d
color2 #8cc85f
color3 #e3c78a
color4 #80a0ff
color5 #cf87e8
color6 #79dac8
color7 #c6c6c6
color8 #949494
color9 #ff5189
color10 #36c692
color11 #c6c684
color12 #74b2ff
color13 #ae81ff
color14 #85dc85
color15 #e4e4e4
selection_background #b2ceee
selection_foreground #080808
active_tab_foreground #080808
active_tab_background #80a0ff
inactive_tab_foreground #b2b2b2
inactive_tab_background #323437
active_border_color #80a0ff
inactive_border_color #323437
